<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Coming Soon | Dragonfly Cakes and More Goito </title>
  <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <style>
    .error-container {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 60px 20px;
      background: linear-gradient(135deg, #5d8a7b 0%, #4a7068 100%);
      color: white;
    }

    .error-content {
      text-align: center;
      max-width: 600px;
    }

    .error-code {
      font-family: 'Libre Baskerville', serif;
      font-size: 5rem;
      font-weight: 700;
      margin-bottom: 20px;
      line-height: 1;
    }

    .error-title {
      font-family: 'Libre Baskerville', serif;
      font-size: 2.5rem;
      font-weight: 400;
      margin-bottom: 20px;
    }

    .error-description {
      font-family: 'Montserrat', sans-serif;
      font-size: 1.1rem;
      margin-bottom: 40px;
      opacity: 0.9;
      line-height: 1.8;
    }

    .error-buttons {
      display: flex;
      gap: 20px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .error-btn {
      padding: 12px 28px;
      background: white;
      color: #5d8a7b;
      text-decoration: none;
      border-radius: 4px;
      font-weight: 600;
      font-size: 0.9rem;
      letter-spacing: 0.08em;
      transition: all 0.2s ease;
      display: inline-block;
      text-transform: uppercase;
    }

    .error-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 16px rgba(0, 0, 0, 0.3);
    }

    .error-btn.secondary {
      background: transparent;
      border: 2px solid white;
      color: white;
    }

    .error-btn.secondary:hover {
      background: rgba(255, 255, 255, 0.1);
    }

    .error-icon {
      font-size: 4rem;
      margin-bottom: 20px;
    }
  </style>
</head>
<body>

  <div class="error-container">
    <div class="error-content">
      <div class="error-icon">🥐</div>
      <div class="error-code">Coming soon</div>
      <h1 class="error-title">DRAGONFLY cakes and more sta arrivando!</h1>
      <p class="error-description">
        Sto scaldando il forno a Goito. <br> 
        Seguimi sui social per l'apertura ufficiale della mia impresa alimentare domestica!  😄
      </p>
      <div class="error-buttons">
        <a href="https://www.instagram.com/dragonflycakesandmore" class="error-btn" target="_blank">Seguimi su Instagram</a>
        <a href="https://wa.me/3534997642" class="error-btn secondary">WhatsApp</a>
      </div>
    </div>
  </div>

</body>
</html>
